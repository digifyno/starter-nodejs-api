<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastify Backend</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.95;
        }
        
        .content {
            padding: 2rem;
        }
        
        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        
        .info-box h2 {
            color: #1f2937;
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }
        
        .info-box p {
            color: #6b7280;
            line-height: 1.6;
        }
        
        .code {
            background: #1f2937;
            color: #10b981;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }
        
        .endpoints {
            margin-top: 1rem;
        }
        
        .endpoint {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0;
        }
        
        .method {
            background: #10b981;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }
        
        .method.post {
            background: #f59e0b;
        }
        
        .path {
            font-family: 'Courier New', monospace;
            color: #1f2937;
        }
        
        .btn {
            display: inline-block;
            text-align: center;
            padding: 1rem 2rem;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
            margin-top: 1rem;
        }
        
        .btn:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }
        
        @media (max-width: 640px) {
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>⚡ Fastify Backend</h1>
                <p class="subtitle">Node.js API is running</p>
            </div>
            
            <div class="content">
                <div class="info-box">
                    <h2>Configure nginx proxy_pass</h2>
                    <p>This is a backend API. To serve a frontend, configure nginx to proxy requests:</p>
                    <p style="margin-top: 1rem;">
                        <code class="code">proxy_pass http://localhost:3000;</code>
                    </p>
                </div>
                
                <div class="info-box">
                    <h2>Available Endpoints</h2>
                    <div class="endpoints">
                        <div class="endpoint">
                            <span class="method">GET</span>
                            <span class="path">/health</span>
                        </div>
                        <div class="endpoint">
                            <span class="method">GET</span>
                            <span class="path">/api/hello</span>
                        </div>
                        <div class="endpoint">
                            <span class="method post">POST</span>
                            <span class="path">/api/items</span>
                        </div>
                        <div class="endpoint">
                            <span class="method">GET</span>
                            <span class="path">/api/items/:id</span>
                        </div>
                    </div>
                </div>
                
                <div style="text-align: center;">
                    <a href="/health" class="btn">🏥 Check Health</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
